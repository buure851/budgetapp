<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Mon Budget</title>

<meta name="theme-color" content="#1565c0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;background:#0d47a1;color:white;padding-bottom:80px}

/* HEADER */
.header{padding:30px 16px 20px;background:#1565c0;text-align:center}
.balance{font-size:34px;font-weight:bold}

/* SCREENS */
.screen{display:none;padding:16px}
.active{display:block}

/* CARD */
.card{background:white;color:black;padding:16px;border-radius:18px;margin-bottom:14px}

/* STATS */
.stats{display:flex;gap:12px;margin-bottom:16px}
.stat{flex:1;background:white;color:black;padding:14px;border-radius:16px;text-align:center}

/* INPUT */
input,select{width:100%;padding:14px;margin-top:10px;border-radius:12px;border:1px solid #ddd}

/* BUTTON */
button{width:100%;padding:14px;margin-top:12px;border:none;border-radius:12px;background:#1565c0;color:white;cursor:pointer}
button:active{opacity:0.8}
.danger{background:#e53935}

/* NAV */
.navbar{position:fixed;bottom:0;left:0;right:0;display:flex;background:white;height:70px}
.navbar button{flex:1;background:white;color:#777;font-size:11px}
.nav-active{color:#1565c0;font-weight:bold}

/* FAB */
.fab{position:fixed;bottom:85px;right:20px;width:60px;height:60px;border-radius:50%;background:#1565c0;color:white;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(0,0,0,0.3)}

/* BAR */
.bar{background:#eee;height:10px;border-radius:10px;overflow:hidden;margin-top:8px}

/* HISTORY */
.history-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eee;cursor:pointer}

/* LOADER */
#loader{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:999}
.spinner{width:40px;height:40px;border:4px solid #fff;border-top:4px solid #1565c0;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="header">
  <div>Solde total</div>
  <div class="balance" id="balance">0 FCFA</div>
</div>

<div id="home" class="screen active">
  <div class="stats">
    <div class="stat">Revenus<br><b id="income"></b></div>
    <div class="stat">Dépenses<br><b id="expenses"></b></div>
  </div>

  <canvas id="chart"></canvas>

  <div id="homePockets"></div>
</div>

<div id="pockets" class="screen">
  <div class="card">
    <input id="pocketName" placeholder="Nom de la poche">
    <input id="pocketAmount" type="number" placeholder="Montant prévu">
    <button onclick="addPocket()">Créer</button>
  </div>
  <div id="pocketsDiv"></div>
</div>

<div id="actions" class="screen">
  <div class="card">
    <input id="incomeName" placeholder="Source (ex: Salaire)">
    <input id="incomeAmount" type="number" placeholder="Montant">
    <input id="incomeComment" placeholder="Commentaire (optionnel)">
    <button onclick="addIncome()">Ajouter revenu</button>
  </div>

  <div class="card">
    <select id="txPocket"></select>
    <input id="txAmount" type="number" placeholder="Montant">
    <input id="txComment" placeholder="Commentaire (optionnel)">
    <button onclick="addTx()" class="danger">Dépenser</button>
  </div>
</div>

<div id="history" class="screen">
  <div class="card">
    <p style="font-size:12px; color:#666; margin-top:0;">Cliquez sur une ligne pour modifier ou supprimer.</p>
    <div id="historyList"></div>
  </div>
</div>

<div class="navbar">
  <button id="nav-home" onclick="showScreen('home')" class="nav-active">🏠</button>
  <button id="nav-pockets" onclick="showScreen('pockets')">📦</button>
  <button id="nav-history" onclick="showScreen('history')">📜</button>
</div>

<div class="fab" onclick="showScreen('actions')">+</div>

<div id="loader"><div class="spinner"></div></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbygLSp3sD0Fxdpgp2TmOlMmT28ifxNMTFdMvVP4oGQG-GTBVds3WiH7HZpxswT9t1TI/exec";

let incomes=[], pockets=[], historyData=[], myChart=null;

function el(id){return document.getElementById(id)}

function showLoader(){el("loader").style.display="flex"}
function hideLoader(){el("loader").style.display="none"}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  el(id).classList.add("active");

  document.querySelectorAll(".navbar button").forEach(b=>b.classList.remove("nav-active"));
  const btn = el("nav-"+id);
  if(btn) btn.classList.add("nav-active");

  if(id==="home") setTimeout(updateGraph,50);
}

function formatMoney(n){
  return new Intl.NumberFormat('fr-FR').format(n);
}

async function load(){
  showLoader();
  try {
    const res = await fetch(API+"?action=getData", { redirect: "follow" });
    const data = await res.json();

    incomes = data.incomes || [];
    pockets = data.pockets || [];
    historyData = data.history || [];

    updateUI();
  } catch(e) {
    alert("Erreur réseau");
  } finally {
    hideLoader();
  }
}

function updateUI(){
  const inc = incomes.reduce((s,i)=>s+i.amount,0);
  const exp = pockets.reduce((s,p)=>s+p.spent,0);

  el("balance").innerText = formatMoney(inc-exp)+" FCFA";
  el("income").innerText = formatMoney(inc);
  el("expenses").innerText = formatMoney(exp);

  // pockets
  el("txPocket").innerHTML="<option disabled selected>Sélectionner une poche...</option>";
  el("pocketsDiv").innerHTML="";
  el("homePockets").innerHTML="";

  pockets.forEach(p=>{
    const opt=document.createElement("option");
    opt.value=p.name;
    opt.textContent=p.name;
    el("txPocket").appendChild(opt);

    const perc = p.planned>0 ? Math.min((p.spent/p.planned)*100,100) : 0;

    const html=`
      <div class="card">
        <b>${p.name}</b>
        <div>${formatMoney(p.planned-p.spent)} restant</div>
        <div class="bar"><div style="width:${perc}%;background:#4caf50;height:100%"></div></div>
      </div>`;
    
    el("pocketsDiv").innerHTML+=html;
    el("homePockets").innerHTML+=html;
  });

  // history
  el("historyList").innerHTML="";
  historyData.forEach(h=>{
    const safeName=(h.name||"").replace(/'/g,"\\'");
    const safeComment=(h.comment||"").replace(/'/g,"\\'");

    el("historyList").innerHTML+=`
      <div class="history-item" onclick="openEdit('${h.id}','${safeName}',${h.amount},'${safeComment}')">
        <div>${h.name}</div>
        <div style="font-weight:bold; color:${h.type==='Revenu' ? '#4caf50' : '#e53935'}">${h.type==='Revenu' ? '+' : '-'}${formatMoney(h.amount)}</div>
      </div>`;
  });

  if(el("home").classList.contains("active")) setTimeout(updateGraph,50);
}

function updateGraph(){
  const canvas = el("chart");
  if(!canvas) return;

  const activePockets = pockets.filter(p => p.spent > 0);
  if(activePockets.length === 0) {
    canvas.style.display = "none";
    return;
  }
  canvas.style.display = "block";

  if(myChart) myChart.destroy();

  myChart = new Chart(canvas,{
    type:"doughnut",
    data:{
      labels:activePockets.map(p=>p.name),
      datasets:[{
        data:activePockets.map(p=>p.spent),
        backgroundColor: ['#e53935', '#1e88e5', '#43a047', '#fb8c00', '#8e24aa', '#00acc1', '#fbc02d', '#d81b60']
      }]
    },
    options:{plugins:{legend:{display:false}}}
  });
}

/* ACTIONS */

async function addIncome(){
  const n = el("incomeName").value;
  const a = el("incomeAmount").value;
  const c = el("incomeComment").value;
  if(!n || !a) return alert("Champs requis !");

  showLoader();
  try {
    await fetch(`${API}?action=add&type=income&name=${encodeURIComponent(n)}&amount=${a}&comment=${encodeURIComponent(c)}`, { redirect: "follow" });
    el("incomeName").value=""; el("incomeAmount").value=""; el("incomeComment").value="";
    await load();
  } catch(e) {
    alert("Erreur de connexion");
  } finally {
    hideLoader();
  }
}

async function addPocket(){
  const n = el("pocketName").value;
  const a = el("pocketAmount").value;
  if(!n || !a) return alert("Champs requis !");

  showLoader();
  try {
    await fetch(`${API}?action=add&type=pocket&name=${encodeURIComponent(n)}&amount=${a}&comment=""`, { redirect: "follow" });
    el("pocketName").value=""; el("pocketAmount").value="";
    await load();
  } catch(e) {
    alert("Erreur de connexion");
  } finally {
    hideLoader();
  }
}

async function addTx(){
  const p = el("txPocket").value;
  const a = el("txAmount").value;
  const c = el("txComment").value;
  if(!p || p === "Sélectionner une poche..." || !a) return alert("Poche et montant requis !");

  showLoader();
  try {
    await fetch(`${API}?action=tx&pocket=${encodeURIComponent(p)}&amount=${a}&comment=${encodeURIComponent(c)}`, { redirect: "follow" });
    el("txAmount").value=""; el("txComment").value="";
    await load();
  } catch(e) {
    alert("Erreur de connexion");
  } finally {
    hideLoader();
  }
}

/* EDIT & DELETE (via prompts natifs) */

async function openEdit(id, name, amount, comment){
  const action = prompt(`Que faire avec : ${name} ?\nTapez 1 pour MODIFIER\nTapez 2 pour SUPPRIMER`, "1");

  if(action === "1") {
    const newAmount = prompt(`Nouveau montant pour ${name} :`, amount);
    if(newAmount === null || newAmount === "") return;

    showLoader();
    try {
      await fetch(`${API}?action=editTx&id=${id}&amount=${newAmount}&comment=${encodeURIComponent(comment)}`, { redirect: "follow" });
      await load();
    } catch(e) {
      alert("Erreur de connexion");
    } finally {
      hideLoader();
    }
  } else if (action === "2") {
    deleteTx(id);
  }
}

async function deleteTx(id){
  if(!confirm("Supprimer définitivement cette transaction ?")) return;

  showLoader();
  try {
    await fetch(`${API}?action=deleteTx&id=${id}`, { redirect: "follow" });
    await load();
  } catch(e) {
    alert("Erreur de connexion");
  } finally {
    hideLoader();
  }
}

// Initialisation
load();
</script>

</body>
</html>
