<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565c0">

<style>
* { box-sizing: border-box; }

body { margin:0; font-family: Arial; background:#0d47a1; color:white; }

/* HEADER */
.header { padding:28px 16px 20px; background:#1565c0; text-align:center; }
.balance { font-size:34px; font-weight:bold; }

/* SCREENS */
.screen { display:none; padding:16px; padding-bottom:110px; }
.active { display:block; }

/* CARD & STATS */
.card { background:white; color:black; padding:14px; border-radius:16px; margin-bottom:14px; }
.stats { display:flex; gap:12px; margin-bottom:16px; }
.stat { flex:1; background:white; color:black; padding:12px; border-radius:14px; text-align:center; }

/* INPUT & BUTTON */
input, select { width:100%; padding:14px; margin-top:8px; border-radius:12px; border:none; background:#f3f3f3; font-size: 16px; }
button { width:100%; padding:14px; margin-top:10px; border:none; border-radius:12px; background:#1565c0; color:white; font-weight:bold; font-size: 16px; }
.danger { background:#e53935; }

/* NAVBAR & FAB */
.navbar { position:fixed; bottom:0; left:0; right:0; display:flex; background:white; border-top:1px solid #ddd; height:65px; z-index: 100;}
.navbar button { flex:1; background:white; color:#1565c0; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:11px; margin-top: 0; border-radius: 0;}
.fab { position:fixed; bottom:75px; right:20px; width:60px; height:60px; border-radius:50%; background:#1565c0; color:white; font-size:28px; display:flex; align-items:center; justify-content:center; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.3);}

/* PROGRESS */
.bar { background:#eee; height:8px; border-radius:10px; overflow:hidden; margin-top:6px; }

/* HISTORY LIST */
.history-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; font-size: 14px;}
.history-item:last-child { border-bottom: none; }
.history-date { color: #888; font-size: 12px; display: block; margin-top: 2px;}
.history-comment { color: #666; font-size: 13px; font-style: italic; display: block; margin-top: 4px; background: #f9f9f9; padding: 4px 8px; border-radius: 6px;}
.text-red { color: #e53935; font-weight: bold; text-align: right;}
.text-green { color: #4caf50; font-weight: bold; text-align: right;}

/* LOADER */
#loader { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; z-index: 999; }
.spinner { width:40px; height:40px; border:4px solid #ddd; border-top:4px solid #1565c0; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { 100% { transform:rotate(360deg); } }

/* PIN SCREEN */
#pinScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d47a1; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
#pinScreen h2 { margin-bottom: 20px; }
#pinInput { text-align: center; letter-spacing: 10px; font-size: 24px; }
</style>
</head>

<body>

<div id="pinScreen">
  <h2>🔒 Code PIN</h2>
  <div style="background: white; padding: 20px; border-radius: 16px; width: 100%; max-width: 300px;">
    <p id="pinMessage" style="color: black; text-align: center; margin-top: 0;">Entrez votre code :</p>
    <input type="password" id="pinInput" maxlength="4" inputmode="numeric">
    <button onclick="verifyPin()">Valider</button>
  </div>
</div>

<div class="header">
  <div>Solde total disponible</div>
  <div class="balance" id="balance">0 FCFA</div>
</div>

<div id="home" class="screen active">
  <div class="stats">
    <div class="stat">Revenus<br><b id="income"></b></div>
    <div class="stat">Dépensé<br><b id="expenses"></b></div>
  </div>
  <div id="homePockets"></div>
</div>

<div id="pockets" class="screen">
  <div class="card">
    <b>Créer une poche</b>
    <input id="pocketName" placeholder="Nom (ex: Loyer)">
    <input id="pocketAmount" type="number" placeholder="Montant prévu">
    <input id="pocketComment" placeholder="Note ou commentaire (optionnel)">
    <button onclick="addPocket()">Créer</button>
  </div>
  <div id="pocketsDiv"></div>
</div>

<div id="actions" class="screen">
  <div class="card">
    <b>Ajouter un revenu</b>
    <input id="incomeName" placeholder="Source (ex: Salaire)">
    <input id="incomeAmount" type="number" placeholder="Montant">
    <input id="incomeComment" placeholder="Note (ex: Mois de Mars)">
    <button onclick="addIncome()">Ajouter</button>
  </div>
  <div class="card">
    <b>Nouvelle dépense</b>
    <select id="txPocket"></select>
    <input id="txAmount" type="number" placeholder="Montant dépensé">
    <input id="txComment" placeholder="Note (ex: Ticket Auchan)">
    <button onclick="addTx()">Dépenser</button>
  </div>
</div>

<div id="history" class="screen">
  <div class="card">
    <b>Dernières transactions</b>
    <div id="historyList" style="margin-top: 10px;"></div>
  </div>
</div>

<div id="settings" class="screen">
  <div class="card">
    <b>Sécurité : Modifier le code PIN</b>
    <input id="oldPin" type="password" placeholder="Ancien code PIN" maxlength="4" inputmode="numeric">
    <input id="newPin" type="password" placeholder="Nouveau code PIN" maxlength="4" inputmode="numeric">
    <button onclick="changePin()">Enregistrer le nouveau code</button>
  </div>
  <div class="card">
    <b>Gestion des données</b>
    <button onclick="resetKeep()" style="background: #ff9800;">🔄 Nouveau mois (Garder les poches)</button>
    <button class="danger" onclick="resetAll()">⚠️ Tout réinitialiser</button>
  </div>
</div>

<div class="fab" onclick="showScreen('actions')">+</div>

<div class="navbar">
  <button onclick="showScreen('home')">🏠<span>Accueil</span></button>
  <button onclick="showScreen('pockets')">📦<span>Poches</span></button>
  <button onclick="showScreen('history')">📜<span>Historique</span></button>
  <button onclick="showScreen('settings')">⚙️<span>Paramètres</span></button>
</div>

<div id="loader"><div class="spinner"></div></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbygLSp3sD0Fxdpgp2TmOlMmT28ifxNMTFdMvVP4oGQG-GTBVds3WiH7HZpxswT9t1TI/exec";

function showLoader(){ document.getElementById('loader').style.display="flex"; }
function hideLoader(){ document.getElementById('loader').style.display="none"; }

let incomes = [];
let pockets = [];
let historyData = [];

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function formatMoney(amount) {
  return new Intl.NumberFormat('fr-FR').format(amount);
}

// ---- SYSTEME DE CODE PIN ----
function initApp() {
  const savedPin = localStorage.getItem('budgetPin');
  if (!savedPin) {
    document.getElementById('pinMessage').innerText = "Créez un code PIN à 4 chiffres :";
  }
}

function verifyPin() {
  const input = document.getElementById('pinInput').value;
  const savedPin = localStorage.getItem('budgetPin');

  if(input.length < 4) return alert("Le code doit faire 4 chiffres.");

  if (!savedPin) {
    localStorage.setItem('budgetPin', input);
    alert("PIN enregistré !");
    document.getElementById('pinScreen').style.display = 'none';
    load();
  } else {
    if (input === savedPin) {
      document.getElementById('pinScreen').style.display = 'none';
      load();
    } else {
      alert("Code PIN incorrect !");
      document.getElementById('pinInput').value = "";
    }
  }
}

function changePin() {
  const oldP = document.getElementById('oldPin').value;
  const newP = document.getElementById('newPin').value;
  const savedPin = localStorage.getItem('budgetPin');
  
  if(oldP !== savedPin) return alert("L'ancien code PIN est incorrect.");
  if(newP.length < 4) return alert("Le nouveau code doit faire 4 chiffres.");
  
  localStorage.setItem('budgetPin', newP);
  alert("Code PIN modifié avec succès !");
  document.getElementById('oldPin').value = "";
  document.getElementById('newPin').value = "";
}

initApp();
// -----------------------------

async function load(){
  const cachedData = localStorage.getItem("budgetCache");
  if(cachedData) {
    const parsed = JSON.parse(cachedData);
    incomes = parsed.incomes || [];
    pockets = parsed.pockets || [];
    historyData = parsed.history || [];
    update();
  } else {
    showLoader();
  }

  try {
    const res = await fetch(API+"?action=getData", { method: "GET", redirect: "follow" });
    const data = await res.json();
    
    localStorage.setItem("budgetCache", JSON.stringify(data));
    incomes = data.incomes;
    pockets = data.pockets;
    historyData = data.history;
    update();
  } catch(e) {
    console.log("Mode hors-ligne, impossible de joindre le serveur.");
  } finally {
    hideLoader();
  }
}

function update(){
  const totalIncome = incomes.reduce((s,i)=>s+i.amount,0);
  const totalSpent = pockets.reduce((s,p)=>s+p.spent,0);

  document.getElementById('balance').innerText = formatMoney(totalIncome - totalSpent) + " FCFA";
  document.getElementById('income').innerText = formatMoney(totalIncome) + " FCFA";
  document.getElementById('expenses').innerText = formatMoney(totalSpent) + " FCFA";

  const txPocket = document.getElementById('txPocket');
  const pocketsDiv = document.getElementById('pocketsDiv');
  const homePockets = document.getElementById('homePockets');
  const historyList = document.getElementById('historyList');

  txPocket.innerHTML=""; pocketsDiv.innerHTML=""; homePockets.innerHTML=""; historyList.innerHTML="";

  pockets.forEach(p=>{
    const opt = document.createElement("option");
    opt.value = p.name;
    opt.textContent = p.name;
    txPocket.appendChild(opt);

    const percent = Math.min((p.spent/p.planned)*100, 100);
    let color = "#4caf50";
    if(percent > 75) color = "#ff9800";
    if(percent >= 100) color = "#f44336";

    const html=`
      <div class="card">
        <b>${p.name}</b><br>
        Reste: ${formatMoney(p.planned - p.spent)} / ${formatMoney(p.planned)} FCFA
        <div class="bar">
          <div style="width:${percent}%; background:${color}; height:100%"></div>
        </div>
      </div>`;
    pocketsDiv.innerHTML += html;
    homePockets.innerHTML += html;
  });

  if(historyData.length === 0) {
    historyList.innerHTML = "<p style='color:#888; text-align:center;'>Aucune transaction.</p>";
  } else {
    historyData.forEach(h => {
      const isDepense = h.type === "Dépense";
      const colorClass = isDepense ? "text-red" : "text-green";
      const sign = isDepense ? "-" : "+";
      const commentHtml = h.comment ? `<span class="history-comment">${h.comment}</span>` : "";
      
      historyList.innerHTML += `
        <div class="history-item">
          <div style="flex: 1;">
            <b>${h.name}</b>
            <span class="history-date">${h.date || 'Récemment'}</span>
            ${commentHtml}
          </div>
          <div class="${colorClass}">${sign}${formatMoney(h.amount)}</div>
        </div>
      `;
    });
  }
}

async function addIncome(){
  const name = document.getElementById('incomeName').value.trim();
  const amount = document.getElementById('incomeAmount').value;
  const comment = document.getElementById('incomeComment').value.trim();
  
  if(!name || !amount || isNaN(amount) || amount <= 0) return alert("Données invalides.");
  showLoader();
  await fetch(`${API}?action=add&type=income&name=${encodeURIComponent(name)}&amount=${amount}&comment=${encodeURIComponent(comment)}`, { method: "GET", redirect: "follow" });
  
  document.getElementById('incomeName').value = ""; document.getElementById('incomeAmount').value = ""; document.getElementById('incomeComment').value = "";
  load();
}

async function addPocket(){
  const name = document.getElementById('pocketName').value.trim();
  const amount = document.getElementById('pocketAmount').value;
  const comment = document.getElementById('pocketComment').value.trim();

  if(!name || !amount || isNaN(amount) || amount <= 0) return alert("Données invalides.");
  showLoader();
  await fetch(`${API}?action=add&type=pocket&name=${encodeURIComponent(name)}&amount=${amount}&comment=${encodeURIComponent(comment)}`, { method: "GET", redirect: "follow" });
  
  document.getElementById('pocketName').value = ""; document.getElementById('pocketAmount').value = ""; document.getElementById('pocketComment').value = "";
  load();
}

async function addTx(){
  const pocket = document.getElementById('txPocket').value;
  const amount = document.getElementById('txAmount').value;
  const comment = document.getElementById('txComment').value.trim();

  if(!pocket || !amount || isNaN(amount) || amount <= 0) return alert("Données invalides.");
  showLoader();
  await fetch(`${API}?action=tx&pocket=${encodeURIComponent(pocket)}&amount=${amount}&comment=${encodeURIComponent(comment)}`, { method: "GET", redirect: "follow" });
  
  document.getElementById('txAmount').value = ""; document.getElementById('txComment').value = "";
  load();
}

async function resetKeep(){
  if(confirm("Démarrer un nouveau mois ? Tes poches seront conservées mais vidées.")){
    showLoader();
    await fetch(`${API}?action=reset&mode=keepPockets`, { method: "GET", redirect: "follow" });
    load();
  }
}

async function resetAll(){
  if(confirm("Tout supprimer définitivement ?")){
    showLoader();
    await fetch(`${API}?action=reset&mode=all`, { method: "GET", redirect: "follow" });
    localStorage.removeItem("budgetCache");
    load();
  }
}
</script>

</body>
</html>
