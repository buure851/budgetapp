<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0d47a1; color:white; }
.header { padding:25px; text-align:center; background:#1565c0; }
.balance { font-size:32px; }

.screen { display:none; padding:15px; padding-bottom:90px; }
.active { display:block; }

.card { background:white; color:black; padding:12px; border-radius:12px; margin-bottom:10px; }

.navbar {
  position:fixed; bottom:0; width:100%;
  display:flex; background:white;
}
.navbar button {
  flex:1; background:white; color:#1565c0;
}

#loader { display:none; position:fixed; top:0; width:100%; height:100%; background:rgba(0,0,0,0.4); }

</style>
</head>

<body>

<div class="header">
  <div>Solde</div>
  <div class="balance" id="balance">0</div>
</div>

<!-- HOME -->
<div id="home" class="screen active">
  <canvas id="chart"></canvas>
</div>

<!-- HISTORY -->
<div id="history" class="screen">
  <div id="historyList"></div>
</div>

<!-- ACTIONS -->
<div id="actions" class="screen">
  <input id="incomeName" placeholder="Revenu">
  <input id="incomeAmount" type="number">
  <button onclick="addIncome()">Ajouter revenu</button>

  <select id="txPocket"></select>
  <input id="txAmount" type="number">
  <button onclick="addTx()">Dépenser</button>
</div>

<div class="navbar">
  <button onclick="show('home')">🏠 Accueil</button>
  <button onclick="show('history')">📜 Historique</button>
  <button onclick="show('actions')">💸 Actions</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbygLSp3sD0Fxdpgp2TmOlMmT28ifxNMTFdMvVP4oGQG-GTBVds3WiH7HZpxswT9t1TI/exec";

let chart;

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

async function load(){
  const res = await fetch(API+"?action=getData");
  const data = await res.json();

  const income = data.incomes.reduce((s,i)=>s+i.amount,0);
  const spent = data.pockets.reduce((s,p)=>s+p.spent,0);

  balance.innerText = income - spent;

  renderChart(data.pockets);
  loadHistory();
}

function renderChart(pockets){
  const ctx = document.getElementById("chart");

  const labels = pockets.map(p=>p.name);
  const values = pockets.map(p=>p.spent);

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type:'doughnut',
    data:{ labels, datasets:[{ data:values }] }
  });

  // 🔔 NOTIFICATION
  pockets.forEach(p=>{
    if(p.spent > p.planned){
      alert("⚠️ Dépassement: " + p.name);
    }
  });
}

async function loadHistory(){
  const res = await fetch(API+"?action=history");
  const data = await res.json();

  historyList.innerHTML="";
  data.forEach(tx=>{
    historyList.innerHTML += `<div class="card">${tx.pocket} - ${tx.amount}</div>`;
  });
}

async function addIncome(){
  await fetch(`${API}?action=add&type=income&name=${incomeName.value}&amount=${incomeAmount.value}`);
  load();
}

async function addTx(){
  await fetch(`${API}?action=tx&pocket=${txPocket.value}&amount=${txAmount.value}`);
  load();
}

load();
</script>

</body>
</html>
