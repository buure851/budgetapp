<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565c0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#0d47a1;color:white}

.header{padding:28px 16px;text-align:center;background:#1565c0}
.balance{font-size:32px;font-weight:bold}

.screen{display:none;padding:16px;padding-bottom:110px}
.active{display:block}

.card{background:white;color:black;padding:14px;border-radius:16px;margin-bottom:14px}

.stats{display:flex;gap:10px;margin-bottom:16px}
.stat{flex:1;background:white;color:black;padding:10px;border-radius:12px;text-align:center}

input,select{width:100%;padding:12px;margin-top:8px;border-radius:10px;border:none;background:#f3f3f3}

button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#1565c0;color:white}

.danger{background:#e53935}

.navbar{position:fixed;bottom:0;left:0;right:0;display:flex;background:white;height:65px}
.navbar button{flex:1;background:white;color:#1565c0;font-size:12px}

.fab{position:fixed;bottom:75px;right:20px;width:60px;height:60px;border-radius:50%;background:#1565c0;color:white;font-size:28px;display:flex;align-items:center;justify-content:center}

.bar{background:#eee;height:8px;border-radius:10px;overflow:hidden;margin-top:6px}

#loader{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center}
.spinner{width:40px;height:40px;border:4px solid #ddd;border-top:4px solid #1565c0;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}

#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 16px;border-radius:20px;display:none}
</style>
</head>

<body>

<div class="header">
  <div>Solde total</div>
  <div class="balance" id="balance">0 FCFA</div>
</div>

<div id="home" class="screen active">
  <div class="stats">
    <div class="stat">Revenus<br><b id="income"></b></div>
    <div class="stat">Dépenses<br><b id="expenses"></b></div>
  </div>

  <canvas id="chart"></canvas>

  <div id="homePockets"></div>
</div>

<div id="history" class="screen">
  <div class="card"><b>Historique</b></div>
  <div id="historyList"></div>
</div>

<div id="pockets" class="screen">
  <div class="card">
    <input id="pocketName">
    <input id="pocketAmount" type="number">
    <button onclick="addPocket()">Créer</button>
  </div>
  <div id="pocketsDiv"></div>
</div>

<div id="actions" class="screen">
  <div class="card">
    <input id="incomeName">
    <input id="incomeAmount" type="number">
    <button onclick="addIncome()">Ajouter revenu</button>
  </div>

  <div class="card">
    <select id="txPocket"></select>
    <input id="txAmount" type="number">
    <button onclick="addTx()">Dépenser</button>
  </div>
</div>

<div class="fab" onclick="showScreen('actions')">+</div>

<div class="navbar">
  <button onclick="showScreen('home')">🏠 Accueil</button>
  <button onclick="showScreen('history')">📜 Historique</button>
  <button onclick="showScreen('pockets')">📦 Poches</button>
  <button onclick="showScreen('actions')">💸 Actions</button>
</div>

<div id="loader"><div class="spinner"></div></div>
<div id="toast"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbygLSp3sD0Fxdpgp2TmOlMmT28ifxNMTFdMvVP4oGQG-GTBVds3WiH7HZpxswT9t1TI/exec";

let incomes=[], pockets=[], transactions=[], chartInstance=null;

function el(id){ return document.getElementById(id); }

function showLoader(){ el("loader").style.display="flex"; }
function hideLoader(){ el("loader").style.display="none"; }

function showToast(msg){
  const t = el("toast");
  t.innerText = msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  el(id).classList.add("active");
}

async function load(){
  try{
    const res = await fetch(API+"?action=getData");
    const data = await res.json();

    incomes = data.incomes || [];
    pockets = data.pockets || [];
    transactions = data.transactions || [];

    update();
  }catch(e){
    showToast("Erreur chargement");
  }
}

function update(){
  const totalIncome = incomes.reduce((s,i)=>s+i.amount,0);
  const totalSpent = pockets.reduce((s,p)=>s+p.spent,0);

  el("balance").innerText = (totalIncome-totalSpent)+" FCFA";
  el("income").innerText = totalIncome;
  el("expenses").innerText = totalSpent;

  // Chart FIX
  if(chartInstance) chartInstance.destroy();

  chartInstance = new Chart(el("chart"), {
    type:"doughnut",
    data:{
      labels:pockets.map(p=>p.name),
      datasets:[{ data:pockets.map(p=>p.spent) }]
    },
    options:{ plugins:{ legend:{display:false} } }
  });

  // pockets
  el("txPocket").innerHTML="";
  el("pocketsDiv").innerHTML="";
  el("homePockets").innerHTML="";

  pockets.forEach(p=>{
    const opt=document.createElement("option");
    opt.value=p.name;
    opt.textContent=p.name;
    el("txPocket").appendChild(opt);

    const percent = p.planned ? Math.min((p.spent/p.planned)*100,100) : 0;

    const html = `
      <div class="card">
        <b>${p.name}</b><br>
        Reste: ${p.planned - p.spent} FCFA
        <div class="bar">
          <div style="width:${percent}%;background:#4caf50;height:100%"></div>
        </div>
      </div>`;

    el("pocketsDiv").innerHTML += html;
    el("homePockets").innerHTML += html;
  });

  // history
  el("historyList").innerHTML="";
  transactions.slice().reverse().forEach(t=>{
    el("historyList").innerHTML += `<div class="card">${t.name} - ${t.amount} FCFA</div>`;
  });
}

async function addIncome(){
  showLoader();
  await fetch(`${API}?action=add&type=income&name=${incomeName.value}&amount=${incomeAmount.value}`);
  hideLoader(); showToast("Revenu ajouté"); load();
}

async function addPocket(){
  showLoader();
  await fetch(`${API}?action=add&type=pocket&name=${pocketName.value}&amount=${pocketAmount.value}`);
  hideLoader(); showToast("Poche créée"); load();
}

async function addTx(){
  showLoader();
  await fetch(`${API}?action=tx&pocket=${txPocket.value}&amount=${txAmount.value}`);
  hideLoader(); showToast("Dépense ajoutée"); load();
}

load();
</script>

</body>
</html>
